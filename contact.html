<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <section class="contact">
    <h2>Bizimlə Əlaqə</h2>
    <p>Suallarınız, təklifləriniz və ya rəyinizi buradan bizə göndərə bilərsiniz.</p>

    <form action="#" method="post">
        <label for="name">Adınız:</label>
        <input type="text" id="name" name="name" placeholder="Adınızı yazın" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Emailinizi yazın" required>

        <label for="subject">Mövzu:</label>
        <input type="text" id="subject" name="subject" placeholder="Mövzunu yazın">

        <label for="message">Mesajınız:</label>
        <textarea id="message" name="message" placeholder="Mesajınızı yazın" required></textarea>

        <button type="submit">Göndər</button>
    </form>

    <div class="contact-info">
        <p>Email: latifahuseynli99@gmail.com</p>
        <p>Ünvan: Bakı, Azərbaycan</p>
        <p>Sosial Media:
            <a href="https://www.instagram.com/latifahsyl?igsh=MWNqNGxzMHcxeHZxYw==">Instagram</a> 
            <a href="https://www.linkedin.com/in/latifa-huseynli-522b51392">LinkedIn</a>
        </p>
    </div>
</section>
</body>
</html>
